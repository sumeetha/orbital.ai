<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Center dot -->
  <circle cx="24" cy="24" r="5" fill="#7c5cfc"/>
  <!-- Orbit ring 1 — tilted -->
  <ellipse cx="24" cy="24" rx="20" ry="8" stroke="#7c5cfc" stroke-width="2.5" fill="none" transform="rotate(-30 24 24)"/>
  <!-- Orbit ring 2 — opposite tilt -->
  <ellipse cx="24" cy="24" rx="20" ry="8" stroke="#7c5cfc" stroke-width="2.5" fill="none" transform="rotate(30 24 24)" opacity="0.6"/>
  <!-- Small accent dot on ring -->
  <circle cx="40" cy="16.5" r="3" fill="#7c5cfc"/>
</svg>
